name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql+psycopg://incidentpilot:incidentpilot@localhost:5432/incidentpilot
      REDIS_URL: redis://localhost:6379/0

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: incidentpilot
          POSTGRES_PASSWORD: incidentpilot
          POSTGRES_DB: incidentpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U incidentpilot -d incidentpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. python -m pytest -q
