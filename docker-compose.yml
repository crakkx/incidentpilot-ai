services:
  api:
    build: .
    container_name: incidentpilot-api
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+psycopg://incidentpilot:incidentpilot@postgres:5432/incidentpilot
      TEST_DATABASE_URL: postgresql+psycopg://incidentpilot:incidentpilot@postgres:5432/incidentpilot_test
      REDIS_URL: redis://redis:6379/0

      HF_HOME: /cache/huggingface
      TORCH_HOME: /cache/torch
      SENTENCE_TRANSFORMERS_HOME: /cache/sentence-transformers
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - hf_cache:/cache/huggingface
      - torch_cache:/cache/torch
      - sentence_transformers_cache:/cache/sentence-transformers
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: pgvector/pgvector:pg17-bookworm
    container_name: incidentpilot-postgres
    environment:
      POSTGRES_USER: incidentpilot
      POSTGRES_PASSWORD: incidentpilot
      POSTGRES_DB: incidentpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incidentpilot -d incidentpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: incidentpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  hf_cache:
  torch_cache:
  sentence_transformers_cache:
